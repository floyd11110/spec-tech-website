<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spec-Tech Logo</title>
  <desc id="desc">Spec-Tech engineering prototype lab logo with circuit, gear, and ST letters.</desc>
  <defs>
    <linearGradient id="bg" x1="16" y1="10" x2="82" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#0EA5E9" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="line" x1="12" y1="16" x2="86" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#BAE6FD"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.219 0 0 0 0 0.741 0 0 0 0 0.973 0 0 0 0.45 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="80" height="80" rx="22" fill="#07111F" stroke="url(#bg)" stroke-width="3"/>
  <rect x="15" y="15" width="66" height="66" rx="18" fill="url(#bg)" opacity="0.16"/>

  <path d="M24 32H36L43 39H53L60 32H72" stroke="url(#line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="24" cy="32" r="4" fill="#38BDF8"/>
  <circle cx="72" cy="32" r="4" fill="#F59E0B"/>

  <path d="M25 64H34L40 58H56L62 64H71" stroke="url(#line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <circle cx="25" cy="64" r="4" fill="#F59E0B"/>
  <circle cx="71" cy="64" r="4" fill="#38BDF8"/>

  <circle cx="48" cy="48" r="15" fill="#07111F" stroke="#7DD3FC" stroke-width="3"/>
  <path d="M48 39V34M48 62V57M39 48H34M62 48H57M41.6 41.6L38.1 38.1M57.9 57.9L54.4 54.4M54.4 41.6L57.9 38.1M38.1 57.9L41.6 54.4" stroke="#BAE6FD" stroke-width="2.2" stroke-linecap="round"/>
  <text x="48" y="54" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF" letter-spacing="-1">ST</text>
</svg>
